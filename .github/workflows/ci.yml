name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install unit-test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install pytest
      - name: Compile
        run: python -m compileall -q .
      - name: Unit and sampler-contract tests
        run: pytest -q

  current-comfyui-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: FlowLab
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Clone current ComfyUI
        run: git clone --depth 1 https://github.com/Comfy-Org/ComfyUI.git ComfyUI
      - name: Install ComfyUI runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision torchaudio
          pip install -r ComfyUI/requirements.txt
      - name: Install FlowLab exactly as a custom node
        run: |
          mkdir -p ComfyUI/custom_nodes
          mv FlowLab ComfyUI/custom_nodes/ComfyUI-Krea2-FlowLab
      - name: Import against current ComfyUI
        working-directory: ComfyUI
        run: python custom_nodes/ComfyUI-Krea2-FlowLab/verify_install.py
